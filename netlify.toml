[build]
  publish = "build/web"
  command = "flutter build web --release"

[build.environment]
  FLUTTER_VERSION = "stable"

[[redirects]]
  from = "/download"
  to = "https://github.com/YOUR_USERNAME/dosh/releases/latest"
  status = 302
  force = true

[[redirects]]
  from = "/apk"
  to = "https://github.com/YOUR_USERNAME/dosh/releases/latest/download/app-release.apk"
  status = 302
  force = true

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
