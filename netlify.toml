[build]
  command = "bash ./scripts/install_flutter.sh && $HOME/flutter/bin/flutter build web --release"
  publish = "build/web"
  ignore = "git diff --quiet HEAD^ HEAD"

[[redirects]]
  from = "/download"
  to = "https://github.com/chedevlooper-creator/dosh/releases/latest"
  status = 302
  force = true

[[redirects]]
  from = "/apk"
  to = "https://github.com/chedevlooper-creator/dosh/releases/latest/download/app-release.apk"
  status = 302
  force = true

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
