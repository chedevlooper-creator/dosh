name: dosh
description: "Дош — Çeçen dilinde premium kelime bulmaca macerası."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  audioplayers: ^6.4.0
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
    - assets/levels/
    - assets/audio/
    - assets/fonts/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: PTSerif
      fonts:
        - asset: assets/fonts/PTSerif-Regular.ttf
        - asset: assets/fonts/PTSerif-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_raw.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#F5B62B"
  adaptive_icon_foreground: "assets/icon/icon_raw.png"
  web:
    generate: true
    image_path: "assets/icon/icon_raw.png"
  windows:
    generate: true
    image_path: "assets/icon/icon_raw.png"
    icon_size: 256

flutter_native_splash:
  color: "#F5B62B"
  image: "assets/icon/icon_raw.png"
  android: true
  ios: true
  web: false
  fullscreen: true
